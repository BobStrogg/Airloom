name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the updated docs/ back to main
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # check out main so we can push docs/ back

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ── Build everything ──────────────────────────────────────
      # 1. Host bundle (also builds the viewer and copies it into dist/)
      - run: pnpm --filter airloom build

      # 2. GitHub Pages single-file viewer → docs/
      - run: pnpm build:pages

      # ── Deploy GitHub Pages ───────────────────────────────────
      - name: Commit updated docs/ to main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add docs/
          if git diff --cached --quiet; then
            echo "docs/ unchanged"
          else
            git commit -m "chore: rebuild GitHub Pages viewer for ${{ github.ref_name }}"
            git push
          fi

      # ── Publish to npm ────────────────────────────────────────
      - run: npm publish --access public
        working-directory: apps/host
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
